name: Dev Build

on:
  push:
    branches: [main]

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: vault
        run: flutter pub get

      - name: Analyze
        working-directory: vault
        run: flutter analyze

      - name: Test
        working-directory: vault
        run: flutter test

      - name: Build APK
        working-directory: vault
        run: flutter build apk --debug

      - name: Upload to JFrog (dev)
        env:
          JFROG_URL: ${{ secrets.JFROG_URL }}
          JFROG_API_KEY: ${{ secrets.JFROG_API_KEY }}
          JFROG_REPO: ${{ secrets.JFROG_REPO }}
        run: |
          DATE=$(date +'%Y-%m-%d')
          FILENAME="vault-${DATE}.apk"
          curl -f -u "$JFROG_API_KEY:" \
            -T vault/build/app/outputs/flutter-apk/app-debug.apk \
            "${JFROG_URL}/artifactory/${JFROG_REPO}/dev/${FILENAME}"
          echo "✅ Uploaded: ${JFROG_URL}/artifactory/${JFROG_REPO}/dev/${FILENAME}"

  ios:
    name: iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Install Apple Certificate
        env:
          P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Install Provisioning Profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Get dependencies
        working-directory: vault
        run: flutter pub get

      - name: Build IPA
        working-directory: vault
        run: flutter build ipa --release --no-codesign

      - name: Upload to JFrog (dev)
        env:
          JFROG_URL: ${{ secrets.JFROG_URL }}
          JFROG_API_KEY: ${{ secrets.JFROG_API_KEY }}
          JFROG_REPO: ${{ secrets.JFROG_REPO }}
        run: |
          DATE=$(date +'%Y-%m-%d')
          FILENAME="vault-${DATE}.ipa"
          IPA_PATH=$(find vault/build/ios/ipa -name "*.ipa" | head -1)
          curl -f -u "$JFROG_API_KEY:" \
            -T "$IPA_PATH" \
            "${JFROG_URL}/artifactory/${JFROG_REPO}/dev/${FILENAME}"
          echo "✅ Uploaded: ${JFROG_URL}/artifactory/${JFROG_REPO}/dev/${FILENAME}"
