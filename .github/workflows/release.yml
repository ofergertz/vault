name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  android:
    name: Android Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: vault
        run: flutter pub get

      - name: Test
        working-directory: vault
        run: flutter test

      - name: Build Release APK
        working-directory: vault
        run: flutter build apk --release

      - name: Rename APK with version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cp vault/build/app/outputs/flutter-apk/app-release.apk vault-${VERSION}.apk
          echo "APK_PATH=vault-${VERSION}.apk" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload to Firebase App Distribution (release)
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: ${{ env.APK_PATH }}
          releaseNotes: "Release v${{ env.VERSION }}"

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          name: "Vault v${{ env.VERSION }}"

  ios:
    name: iOS Release IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Install Apple Certificate
        env:
          P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Install Provisioning Profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Get dependencies
        working-directory: vault
        run: flutter pub get

      - name: Build Release IPA
        working-directory: vault
        run: flutter build ipa --release

      - name: Rename IPA with version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          IPA_SRC=$(find vault/build/ios/ipa -name "*.ipa" | head -1)
          cp "$IPA_SRC" vault-${VERSION}.ipa
          echo "IPA_PATH=vault-${VERSION}.ipa" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload to Firebase App Distribution (release)
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_IOS_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: ${{ env.IPA_PATH }}
          releaseNotes: "Release v${{ env.VERSION }}"

      - name: Attach IPA to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.IPA_PATH }}
          name: "Vault v${{ env.VERSION }}"
